<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>横山未来子 サイト初稿 モバイル確認</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #e9e4dd;
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      }
      .wrap {
        width: min(100vw - 24px, 460px);
        display: grid;
        gap: 14px;
      }
      h1 {
        margin: 0;
        font-size: 16px;
        text-align: center;
        font-weight: 600;
        color: #433a33;
      }
      p {
        margin: 0;
        font-size: 12px;
        line-height: 1.6;
        color: #5b5048;
        text-align: center;
      }
      .phone {
        aspect-ratio: 390 / 844;
        width: 100%;
        border-radius: 34px;
        overflow: hidden;
        border: 10px solid #1f1f1f;
        background: #fff;
        box-shadow: 0 16px 38px rgba(0,0,0,.18);
      }
      iframe { width: 100%; height: 100%; border: 0; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>スマホ確認用プレビュー</h1>
      <p>390×844相当の確認用です。実機確認前の仮確認として使ってください。</p>
      <div class="phone">
        <iframe src="index.html" title="横山未来子サイト モバイル確認"></iframe>
      </div>
    </div>
  </body>
</html>
